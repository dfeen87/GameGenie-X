[platform]
id = "ps4"
name = "PlayStation 4"
short_name = "PS4"

[address]
bits = 32
max = 0xFFFFFFFF

[data]
bits = 8
endianness = "little"

[compare]
supported = true
behavior = "exact"

[defaults]
