type = "int"
description = "Player currency (integer)"

[fields.level]
offset = 0x3004
type = "int"
description = "Player level (integer)"

[fields.is_unlocked]
offset = 0x3008
type = "bool"
description = "Unlock all items (boolean)"

[fields.flags]
offset = 0x300C
type = "bitfield"
description = "Game progression flags"
