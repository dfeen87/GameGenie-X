name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Test / ${{ matrix.os }} / Python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint with ruff
        run: ruff check src/gamegenie_x/ tests/ fuzz/

      - name: Type-check with mypy
        run: mypy --strict src/gamegenie_x/

      - name: Run security scan with bandit
        run: bandit -r src/gamegenie_x/ -lll

      - name: Enforce docstring coverage with interrogate
        run: interrogate src/gamegenie_x/

      - name: Run tests with coverage
        run: pytest tests/ fuzz/ --cov=gamegenie_x --cov-report=xml:coverage.xml --cov-report=term-missing --junitxml=test-results.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: test-results.xml
          if-no-files-found: warn
